name: CI — Release

# PAUSED — re-enable by restoring the trigger below when ready for release
# on:
#   push:
#     tags:
#       - 'v*.*.*'
on:
  workflow_dispatch:

jobs:
  release:
    name: Build and Publish Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout (full history for release notes)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v3

      - name: Decode google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > app/google-services.json

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks

      - name: Write secrets.properties
        run: |
          cat > secrets.properties << EOF
          KEYSTORE_PATH=keystore.jks
          KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS=${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
          KITE_API_KEY=${{ secrets.KITE_API_KEY }}
          GOOGLE_OAUTH_CLIENT_ID=${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          EOF

      # --- START MODIFICATION ---
      # [FM-006] Build Cloud Functions TypeScript before Android build
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Cloud Functions
        run: |
          cd functions
          npm ci
          npm run build
      # --- END MODIFICATION ---

      - name: Run release unit tests
        run: ./gradlew testReleaseUnitTest --no-daemon

      - name: Assemble release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Verify APK signature
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "Verifying: $APK_PATH"
          $ANDROID_SDK_ROOT/build-tools/$(ls $ANDROID_SDK_ROOT/build-tools | sort -V | tail -1)/apksigner \
            verify --print-certs "$APK_PATH"

      - name: Compute SHA-256
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          APK_NAME=$(basename "$APK_PATH")
          sha256sum "$APK_PATH" > "${APK_NAME}.sha256"
          echo "APK_PATH=$APK_PATH" >> "$GITHUB_ENV"
          echo "APK_NAME=$APK_NAME" >> "$GITHUB_ENV"

      - name: Clean up secrets
        if: always()
        run: |
          rm -f keystore.jks secrets.properties app/google-services.json

      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: KiteWatch ${{ github.ref_name }}
          body: |
            ## KiteWatch ${{ github.ref_name }}

            ### Installation
            1. Download `${{ env.APK_NAME }}` below.
            2. Transfer to your Android device.
            3. Enable "Install from unknown sources" in Settings → Security.
            4. Open the APK file to install.

            ### Verification
            Verify APK integrity using the attached `.sha256` file:
            ```
            sha256sum -c ${{ env.APK_NAME }}.sha256
            ```
          files: |
            ${{ env.APK_PATH }}
            ${{ env.APK_NAME }}.sha256
